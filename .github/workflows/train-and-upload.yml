name: Train and Upload to Hugging Face

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  train-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train model
        run: python train.py

      - name: Upload to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
   mkdir -p .github/workflows && cat > .github/workflows/train-and-upload.yml << 'EOF'
name: Train and Upload to Hugging Face

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  train-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train model
        run: python train.py

      - name: Upload to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'PYEOF'
          import os
          from huggingface_hub import HfApi

          token = os.environ["HF_TOKEN"]
          repo_id = "Axeeel/imdb-sentiment-nn"
          api = HfApi()

          api.create_repo(repo_id, token=token, exist_ok=True)

          for filename in ["sentiment_model.pth", "vectorizer.pkl", "model_info.json"]:
              api.upload_file(
                  path_or_fileobj=filename,
                  path_in_repo=filename,
                  repo_id=repo_id,
                  token=token,
              )
              print(f"Uploaded {filename}")

          print(f"Done! https://huggingface.co/{repo_id}")
          PYEOF
